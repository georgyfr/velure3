<!-- wp:group {"tagName":"main","className":"velure-content-wrapper"} -->
<main class="velure-content-wrapper">

  <!-- Article Header -->
  <div class="velure-page-banner">
    <div class="velure-container" style="max-width: 800px; text-align: left;">
      <span class="velure-eyebrow"><!-- wp:post-terms {"term":"category"} /--></span>
      <h1 style="font-size: clamp(2rem, 4vw, 3rem); margin-bottom: 1rem; text-align: left;"><!-- wp:post-title /--></h1>
      <div style="display: flex; align-items: center; gap: 1.5rem; font-size: 0.8rem; color: #888;">
        <span><!-- wp:post-date /--></span>
        <span>Par <!-- wp:post-author /--></span>
        <span><!-- wp:post-terms {"term":"post_tag"} /--></span>
      </div>
    </div>
  </div>

  <!-- Featured Image -->
  <div class="velure-container" style="max-width: 900px;">
    <div style="margin: -1rem 0 3rem;">
      <!-- wp:post-featured-image {"size":"large"} /-->
    </div>
  </div>

  <!-- Article Content -->
  <div class="velure-section" style="padding-top: 0;">
    <div class="velure-container" style="max-width: 720px;">
      <article style="font-size: 1.1rem; line-height: 1.85; color: #333;">
        <!-- wp:post-content /-->
      </article>

      <!-- Tags -->
      <div style="margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--v-color-border);">
        <span style="font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #888;">Tags :</span>
        <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem; flex-wrap: wrap;">
          <!-- wp:post-terms {"term":"post_tag"} /-->
        </div>
      </div>

      <!-- Share -->
      <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--v-color-border); display: flex; align-items: center; gap: 1rem;">
        <span style="font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #888;">Partager :</span>
        <a href="#" class="velure-social-link" aria-label="Facebook">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>

      <!-- Post Navigation -->
      <div style="margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--v-color-border);">
        <!-- wp:post-navigation /-->
      </div>

      <!-- Comments -->
      <div style="margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--v-color-border);">
        <!-- wp:comments /-->
      </div>
    </div>
  </div>

</main>
